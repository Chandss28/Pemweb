<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Mahasiswa</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: url('662eead8-1e7d-45af-a409-0fcf66873a8b.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }

        .table-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.70);
            padding: 20px;
            border-radius: 10px;
            width: 400px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: white;
        }

        th, td {
            border: 1px solid white;
            padding: 10px;
            text-align: center;
        }

        th {
            background: rgba(255, 255, 255, 0.3);
        }

        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #FF5733;
            color: white;
            text-decoration: none;
            border-radius: 10px;
        }

        .button:hover {
            background: #c70039;
        }
    </style>
</head>
<body>
    <div class="table-container">
        <h2>Data Mahasiswa</h2>
        <table>
            <tr>
                <th>Nama</th>
                <th>Usia</th>
            </tr>
            <tr>
                <td>Adit</td>
                <td>22</td>
            </tr>
            <tr>
                <td>Budi</td>
                <td>24</td>
            </tr>
        </table>
        <a href="index.html" class="button">Kembali</a>
    </div>
</body>
</html>
